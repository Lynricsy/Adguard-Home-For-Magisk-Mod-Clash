name: Build and release AdRulesUltra MRS

on:
  workflow_dispatch:
  schedule:
    - cron: "23 20 * * *"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout converter
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Fetch upstream rules
        run: |
          git clone --depth=1 https://github.com/liuzq2002/Adguard-Home-For-Magisk-Mod upstream-adguard
          git clone --depth=1 https://github.com/privacy-protection-tools/anti-AD upstream-anti-ad
          curl -fsSL https://raw.githubusercontent.com/lingeringsound/10007/main/reward -o upstream-coolapk-1007-reward.txt
          echo "ADGUARD_SHA=$(git -C upstream-adguard rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "ANTI_AD_SHA=$(git -C upstream-anti-ad rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "COOLAPK_1007_REWARD_SHA=$(sha256sum upstream-coolapk-1007-reward.txt | cut -d ' ' -f 1)" >> "$GITHUB_ENV"
          echo "RELEASE_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Build text rule providers
        run: |
          uv run python -m scripts.build_rulesets \
            --adguard-source upstream-adguard \
            --anti-ad-source upstream-anti-ad \
            --coolapk-1007-reward-source upstream-coolapk-1007-reward.txt \
            --output dist \
            --adguard-commit "$ADGUARD_SHA" \
            --anti-ad-commit "$ANTI_AD_SHA" \
            --coolapk-1007-reward-commit "$COOLAPK_1007_REWARD_SHA"

      - name: Install latest mihomo
        run: |
          python3 - <<'PY' > /tmp/mihomo_url
          from __future__ import annotations

          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/MetaCubeX/mihomo/releases/latest", timeout=30) as response:
              release = json.load(response)
          for asset in release["assets"]:
              name = asset["name"]
              if name.startswith("mihomo-linux-amd64-") and name.endswith(".gz") and "-go" not in name:
                  print(asset["browser_download_url"])
                  raise SystemExit(0)
          raise SystemExit("missing linux amd64 mihomo asset")
          PY
          curl -fsSL "$(cat /tmp/mihomo_url)" -o /tmp/mihomo.gz
          gzip -d /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          /tmp/mihomo -v

      - name: Convert to MRS
        run: |
          set -euo pipefail
          for file in dist/adrules_ultra_ads.txt dist/adrules_ultra_allow.txt dist/adrules_ultra_malware.txt; do
            /tmp/mihomo convert-ruleset domain text "$file" "${file%.txt}.mrs"
          done
          for file in dist/adrules_ultra_ads_ipcidr.txt dist/adrules_ultra_allow_ipcidr.txt dist/adrules_ultra_malware_ipcidr.txt; do
            if [ -s "$file" ]; then
              /tmp/mihomo convert-ruleset ipcidr text "$file" "${file%.txt}.mrs"
            fi
          done
          uv run python -m scripts.ruleset_stats --output dist
          find dist -maxdepth 1 -type f -size 0 -delete
          find dist -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS
          sha256sum -c dist/SHA256SUMS

      - name: Prepare release notes
        run: |
          {
            echo "# AdRulesUltra mihomo MRS"
            echo
            echo "- Upstream: https://github.com/liuzq2002/Adguard-Home-For-Magisk-Mod"
            echo "- Upstream commit: \`$ADGUARD_SHA\`"
            echo "- Upstream: https://github.com/privacy-protection-tools/anti-AD"
            echo "- Upstream commit: \`$ANTI_AD_SHA\`"
            echo "- Upstream: https://raw.githubusercontent.com/lingeringsound/10007/main/reward"
            echo "- Upstream SHA256: \`$COOLAPK_1007_REWARD_SHA\`"
            echo "- Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            cat dist/manifest.md
          } > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ env.ADGUARD_SHA }}-${{ env.ANTI_AD_SHA }}-${{ env.COOLAPK_1007_REWARD_SHA }}
          name: AdRulesUltra MRS ${{ env.RELEASE_DATE }}
          body_path: release-notes.md
          files: |
            dist/*.mrs
            dist/*.txt
            dist/manifest.md
            dist/stats.json
            dist/SHA256SUMS
          make_latest: true
          overwrite_files: true
